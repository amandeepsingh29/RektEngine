<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RektEngine — live risk</title>
<style>
  :root {
    --bg:#0d1117; --panel:#161b22; --line:#30363d; --text:#e6edf3;
    --muted:#8b949e; --up:#3fb950; --down:#f85149; --accent:#58a6ff;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--text);
         font:14px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace; }
  header { display:flex; align-items:center; gap:12px; padding:14px 20px;
           border-bottom:1px solid var(--line); }
  header h1 { font-size:16px; margin:0; letter-spacing:.5px; }
  header .sub { color:var(--muted); font-size:12px; }
  .dot { width:9px; height:9px; border-radius:50%; background:var(--down); }
  .dot.on { background:var(--up); }
  .wrap { padding:20px; display:grid; gap:20px; max-width:1100px; margin:0 auto; }
  .kpis { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
  .kpi { background:var(--panel); border:1px solid var(--line); border-radius:8px;
         padding:14px 16px; }
  .kpi .label { color:var(--muted); font-size:11px; text-transform:uppercase;
                letter-spacing:.6px; }
  .kpi .val { font-size:24px; margin-top:4px; }
  .grid { display:grid; grid-template-columns:2fr 1fr; gap:20px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:8px;
          overflow:hidden; }
  .card h2 { font-size:12px; text-transform:uppercase; letter-spacing:.6px;
             color:var(--muted); margin:0; padding:12px 16px;
             border-bottom:1px solid var(--line); }
  table { width:100%; border-collapse:collapse; }
  th,td { text-align:right; padding:8px 12px; border-bottom:1px solid var(--line);
          white-space:nowrap; }
  th:first-child, td:first-child { text-align:left; }
  th { color:var(--muted); font-weight:500; font-size:11px; text-transform:uppercase; }
  tr:last-child td { border-bottom:none; }
  .up { color:var(--up); } .down { color:var(--down); } .muted { color:var(--muted); }
  .flash { animation:flash .9s ease-out; }
  @keyframes flash { from { background:rgba(248,81,73,.35); } to { background:transparent; } }
  .log { max-height:320px; overflow:auto; padding:6px 0; }
  .log .row { padding:8px 16px; border-bottom:1px solid var(--line); font-size:13px; }
  .log .row:last-child { border-bottom:none; }
  .btn { background:var(--accent); color:#06122b; border:none; border-radius:6px;
         padding:8px 14px; font:inherit; font-weight:600; cursor:pointer; }
  .btn:hover { filter:brightness(1.1); }
  .price { font-variant-numeric:tabular-nums; }
</style>
</head>
<body>
<header>
  <div class="dot" id="conn"></div>
  <h1>RektEngine</h1>
  <span class="sub">Risk Evaluation &amp; Kill-off Tracking Engine — live</span>
  <span style="flex:1"></span>
  <button class="btn" id="seed">Seed demo accounts</button>
</header>

<div class="wrap">
  <div class="kpis">
    <div class="kpi"><div class="label">BTC mark</div><div class="val price" id="k-price">—</div></div>
    <div class="kpi"><div class="label">Accounts</div><div class="val" id="k-acc">0</div></div>
    <div class="kpi"><div class="label">Open positions</div><div class="val" id="k-pos">0</div></div>
    <div class="kpi"><div class="label">Liquidations</div><div class="val down" id="k-liq">0</div></div>
  </div>

  <div class="grid">
    <div class="card">
      <h2>Accounts &amp; positions</h2>
      <table>
        <thead><tr>
          <th>Account</th><th>Pos</th><th>Lev</th><th>Entry</th><th>Mark</th>
          <th>uPnL</th><th>Liq price</th><th>To&nbsp;liq</th><th>Equity</th>
        </tr></thead>
        <tbody id="rows"><tr><td colspan="9" class="muted">no accounts — click “Seed demo accounts”</td></tr></tbody>
      </table>
    </div>
    <div class="card">
      <h2>Liquidation feed</h2>
      <div class="log" id="log"><div class="row muted">waiting…</div></div>
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
let liqCount = 0, lastPrice = null;

// --- live WebSocket: price ticker + liquidation flashes ---
function connect() {
  const ws = new WebSocket(`ws://${location.host}/ws`);
  ws.onopen  = () => $("conn").classList.add("on");
  ws.onclose = () => { $("conn").classList.remove("on"); setTimeout(connect, 1000); };
  ws.onmessage = e => {
    const m = JSON.parse(e.data);
    if (m.type === "tick" && m.symbol === "BTC") {
      const el = $("k-price");
      el.textContent = m.price.toFixed(2);
      el.className = "val price " + (lastPrice !== null && m.price < lastPrice ? "down" : "up");
      lastPrice = m.price;
    } else if (m.type === "liquidation") {
      liqCount++; $("k-liq").textContent = liqCount;
      const row = document.createElement("div");
      row.className = "row flash";
      row.innerHTML = `<span class="down">LIQUIDATED</span> ${m.acct_id} · ${m.symbol}
        @ ${m.exit_price.toFixed(2)} · PnL <span class="down">${m.realized_pnl.toFixed(2)}</span>`;
      const log = $("log");
      if (log.firstChild && log.firstChild.classList.contains("muted")) log.innerHTML = "";
      log.prepend(row);
    }
  };
}
connect();

// --- poll account state for the table (every 750ms) ---
async function refresh() {
  const accts = await fetch("/accounts").then(r => r.json());
  $("k-acc").textContent = accts.length;
  $("k-pos").textContent = accts.reduce((n, a) => n + a.positions.length, 0);

  const rows = [];
  for (const a of accts) {
    if (!a.positions.length) {
      rows.push(`<tr><td>${a.id}</td><td class="muted" colspan="7">— flat —</td>
        <td>${a.equity.toFixed(2)}</td></tr>`);
      continue;
    }
    for (const p of a.positions) {
      const toLiq = (p.mark - p.liq_price) / p.mark * 100 * (p.side === "long" ? 1 : -1);
      const pnlCls = p.upnl >= 0 ? "up" : "down";
      const warn = Math.abs(toLiq) < 1 ? "down" : "";
      rows.push(`<tr>
        <td>${a.id}</td>
        <td class="${p.side === "long" ? "up" : "down"}">${p.side} ${p.symbol}</td>
        <td>${p.leverage}x</td>
        <td>${p.entry.toFixed(2)}</td>
        <td>${p.mark.toFixed(2)}</td>
        <td class="${pnlCls}">${p.upnl.toFixed(2)}</td>
        <td>${p.liq_price.toFixed(2)}</td>
        <td class="${warn}">${toLiq.toFixed(2)}%</td>
        <td>${a.equity.toFixed(2)}</td></tr>`);
    }
  }
  $("rows").innerHTML = rows.join("") ||
    `<tr><td colspan="9" class="muted">no accounts — click “Seed demo accounts”</td></tr>`;
}
setInterval(refresh, 750);
refresh();

// --- seed a handful of accounts with varied leverage on one BTC feed ---
$("seed").onclick = async () => {
  const seed = [
    ["alice", "long", 5],  ["bob", "long", 20], ["carol", "long", 50],
    ["dave", "long", 100], ["eve", "short", 20],
  ];
  for (const [id, side, lev] of seed) {
    await fetch("/accounts", { method:"POST", headers:{"content-type":"application/json"},
      body: JSON.stringify({ id, balance:10000, cross:false }) });
    await fetch(`/accounts/${id}/positions`, { method:"POST",
      headers:{"content-type":"application/json"},
      body: JSON.stringify({ symbol:"BTC", side, size:1, entry:100, leverage:lev }) });
  }
  refresh();
};
</script>
</body>
</html>
